# nsjail 沙盒配置（有状态代码执行 Kernel）
#
# 用法（由 KernelManager 自动调用）：
#   nsjail --config sandbox.cfg \
#       -B {host_workspace}:/workspace \
#       -B {host_staging}:/staging \
#       -B {host_output}:/output \
#       -- /venv/bin/python3 -u -m services.sandbox.kernel_worker \
#          /workspace /staging /output
#
# 安全模型：
#   外层：nsjail（namespace + cgroups + chroot）
#   内层：kernel_worker 的 L1-L7 安全层（AST/import/builtins/文件白名单等）

name: "sandbox"
mode: ONCE
hostname: "sandbox"
time_limit: 0

# --- 文件系统（只读挂载系统目录 + 可写用户目录） ---

# 系统库（Python 运行所需）
mount { src: "/usr"   dst: "/usr"   is_bind: true  rw: false }
mount { src: "/lib"   dst: "/lib"   is_bind: true  rw: false }
mount { src: "/lib64" dst: "/lib64" is_bind: true  rw: false }

# 系统配置（库读取 mime.types / alternatives 等）
mount { src: "/etc/alternatives"   dst: "/etc/alternatives"   is_bind: true  rw: false }
mount { src: "/etc/mime.types"     dst: "/etc/mime.types"     is_bind: true  rw: false }

# 时区数据
mount { src: "/usr/share/zoneinfo" dst: "/usr/share/zoneinfo" is_bind: true  rw: false }

# Python venv（只读）
mount { src: "/var/www/everydayai/backend/venv" dst: "/venv" is_bind: true  rw: false }

# 后端代码（kernel_worker 模块导入用，只读）
mount { src: "/var/www/everydayai/backend" dst: "/app" is_bind: true  rw: false }

# 用户目录（可写，由 KernelManager 通过 -B 参数动态指定）
# -B {host_workspace}:/workspace
# -B {host_staging}:/staging
# -B {host_output}:/output

# 临时目录（xlsxwriter/openpyxl 等需要）
mount { dst: "/tmp" fstype: "tmpfs" rw: true }

# proc（部分库需要读 /proc/self）
mount { dst: "/proc" fstype: "proc"  rw: false }

# --- 资源限制（cgroups v1） ---
cgroup_mem_max: 1073741824
cgroup_pids_max: 32
cgroup_cpu_ms_per_sec: 800

# --- 网络隔离（完全断网） ---
clone_newnet: true

# --- UID/GID 映射 ---
uidmap { inside_id: "1000" outside_id: "1000" count: 1 }
gidmap { inside_id: "1000" outside_id: "1000" count: 1 }

# --- 进程资源硬限制 ---
rlimit_as_type: HARD
rlimit_as: 2048
rlimit_fsize_type: HARD
rlimit_fsize: 512
rlimit_nofile_type: HARD
rlimit_nofile: 256
